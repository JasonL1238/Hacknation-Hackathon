name: genome-firewall
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  # Pinned to the versions recorded in final_models/manifest.json for pickle safety.
  - scikit-learn=1.9.0
  - xgboost=3.2.0
  - joblib
  - scipy
  - pyarrow          # parquet
  - matplotlib
  - pyyaml
  - requests
  - biopython
  - streamlit
  - mash             # genome sketching for de-dup + grouped split (bioconda)
  # Runtime inference must use the same software/database recorded in feature_spec.json.
  - ncbi-amrfinderplus=4.2.7
  - pip:
      - supabase>=2.4    # auth + PostgreSQL + storage backend (app/)
      - python-dotenv    # load SUPABASE_* from .env
      - pypdf            # extract patient name / MRN from an uploaded PDF (app/)
