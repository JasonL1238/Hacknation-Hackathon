# Copy only the two values below into Streamlit Community Cloud's Advanced
# settings → Secrets box. Never commit a real secrets.toml file.
SUPABASE_URL = "https://YOUR_PROJECT.supabase.co"
SUPABASE_KEY = "YOUR_PUBLISHABLE_OR_ANON_KEY"

# Optional; authenticated deployments disable guest access by default.
# ENABLE_DEMO_MODE = "true"

# Optional URL override; normally detected from the running Streamlit app.
# AUTH_REDIRECT_URL = "https://YOUR_APP.streamlit.app"
