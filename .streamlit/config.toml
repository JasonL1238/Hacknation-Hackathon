# Genome Firewall — Streamlit base theme.
# The full design system is injected as CSS by app/ui/theme.py; these base
# tokens keep Streamlit's built-in widget accents (sliders, checkboxes, focus)
# aligned with the refined blue brand accent. Status colors (green/red/amber)
# are applied contextually in the app, never as the global primary.

[theme]
base = "light"
primaryColor = "#2563eb"
backgroundColor = "#f4f6fa"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f1b2d"
font = "sans serif"

[server]
headless = true
